name: CI

on:
  pull_request:
  push:
    branches: [dev, main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e '.[dev]'
      - run: ruff check .

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e '.[dev]'
      # Pre-pull/build the images the Docker-backed tests need so they actually run in CI
      # rather than silently self-skipping (they gate on shutil.which("docker") and, for
      # test_runner_docker_warmup.py, on python:3.12-slim already having a local RepoDigest).
      - run: docker pull python:3.12-slim
      - run: docker build -f docker/glyph-runner-default.Dockerfile -t glyph-runner-default:latest .
      - run: pytest -q
